<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TropicsTracker.net — Live Hurricane & Tropical Weather Tracking</title>
    <meta name="description" content="Live hurricane and tropical weather tracking. Interactive storm map, GOES satellite, local radar, NWS alerts, and the best NHC and academic resources in one place.">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#0f172a">
    <link rel="canonical" href="https://tropicstracker.net/">

    <!-- Open Graph / social -->
    <meta property="og:title" content="TropicsTracker.net — Live Tropical Weather Tracking">
    <meta property="og:description" content="Interactive storm map, GOES satellite, local radar, and curated hurricane resources.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tropicstracker.net/">

    <!-- Inline SVG favicon (no extra request) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%80%3C/text%3E%3C/svg%3E">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="header">
        <div class="header-content">
            <a class="logo" href="#track" aria-label="TropicsTracker.net home">
                <i class="fas fa-hurricane" aria-hidden="true"></i>
                <span>TropicsTracker<span class="logo-tld">.net</span></span>
            </a>
            <nav class="nav-tabs" id="nav-tabs" aria-label="Primary"></nav>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
        </div>
    </header>

    <div id="alert-banner" class="alert-banner" role="region" aria-label="Weather alerts" hidden></div>

    <main class="main-container" id="main">
        <section class="content-section" id="section-outlet" aria-live="polite"></section>
    </main>

    <footer class="site-footer">
        <p>
            For informational purposes only. Always follow the
            <a href="https://www.nhc.noaa.gov/" target="_blank" rel="noopener">National Hurricane Center</a>
            and local emergency management for official forecasts and evacuation orders.
        </p>
        <p class="footer-meta">© 2026 TropicsTracker.net · Built with public NOAA, NWS, and academic data.</p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
